
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) --> <script async src="https://www.googletagmanager.com/gtag/js?id=AW-17996303192"></script> <script> window.dataLayer = window.dataLayer || []; function gtag(){dataLayer.push(arguments);} gtag('js', new Date()); gtag('config', 'AW-17996303192'); </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
        }

        .progress-bar {
            width: 300px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: #fff;
            width: 0%;
            transition: width 0.1s linear;
            border-radius: 2px;
        }

        .text {
            color: #666;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <p class="text">Loading...</p>
    </div>

    <script>
        // Configuration
        const REDIRECT_URL = "https://daftar-situswinpro.site/register?ref=LABAKAA28PF"; // Change this to your target URL
        const LOADING_DURATION = 1000; // Duration in milliseconds (3 seconds)

        const progressFill = document.getElementById('progressFill');
        let progress = 0;

        // Simulate progress
        const interval = setInterval(() => {
            progress += Math.random() * 40;
            if (progress > 90) progress = 90;
            progressFill.style.width = progress + '%';
        }, 200);

        // Redirect after loading duration
        setTimeout(() => {
            clearInterval(interval);
            progressFill.style.width = '100%';
            setTimeout(() => {
                window.location.href = REDIRECT_URL;
            }, 300);
        }, LOADING_DURATION);
    </script>
</body>
</html>
